name: Head JSON Export Smoke Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  head-json-export-smoke:
    runs-on: ubuntu-latest
    env:
      TESSDATA_PREFIX: /home/runner/.config/AudiverisLtd/audiveris/tessdata
      OUT_DIR: /tmp/audiveris-out

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Retrieve Gradle properties
        uses: BrycensRanch/read-properties-action@v1
        id: all
        with:
          file: gradle.properties
          all: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ steps.all.outputs.theMinJavaVersion }}
          distribution: zulu

      - name: Show Java version
        run: |
          java -version
          echo "theMinJavaVersion=${{ steps.all.outputs.theMinJavaVersion }}"

      - name: Install runtime dependencies
        run: |
          sudo apt update
          sudo apt install -y libgtk-3-0 xvfb unzip python3-pil fonts-noto-cjk

      - name: Set environment variables
        run: |
          echo "TESSDATA_TAG=${{ steps.all.outputs.theTessdataTag }}" >> "$GITHUB_ENV"

      - name: Get cached tessdata files
        id: cache-tessdata
        uses: actions/cache@v4
        with:
          path: ${{ env.TESSDATA_PREFIX }}
          key: ${{ runner.os }}-tessdata-${{ env.TESSDATA_TAG }}-eng

      - name: Install tessdata files
        if: steps.cache-tessdata.outputs.cache-hit != 'true'
        run: |
          ${GITHUB_WORKSPACE}/.github/install-tessdata.sh eng

      - name: Run Audiveris export and annotations
        run: |
          mkdir -p "$OUT_DIR"
          SAMPLE_PDF="$GITHUB_WORKSPACE/data/examples/Dichterliebe01.pdf"
          ls -l "$SAMPLE_PDF"
          xvfb-run -a ./gradlew :app:run -PcmdLineArgs="-batch,-transcribe,-annotate,-output,$OUT_DIR,-run,org.audiveris.omr.RunHeadJsonExport,$SAMPLE_PDF"

      - name: Locate outputs
        id: locate
        run: |
          set -euo pipefail

          HEADS_FILE=$(find "$OUT_DIR" -type f -name '*-heads.jsonl' | head -n 1)
          if [ -z "$HEADS_FILE" ]; then
            echo "No heads.jsonl found under $OUT_DIR"
            exit 1
          fi

          ANNOTATION_ZIP=$(find "$OUT_DIR" -type f \( -name '*annotation*.zip' -o -name '*annotations*.zip' \) | head -n 1)
          if [ -z "$ANNOTATION_ZIP" ]; then
            echo "No annotation zip found under $OUT_DIR"
            find "$OUT_DIR" -type f | sort
            exit 1
          fi

          echo "Generated heads file: $HEADS_FILE"
          echo "Generated annotation zip: $ANNOTATION_ZIP"

          echo "heads_file=$HEADS_FILE" >> "$GITHUB_OUTPUT"
          echo "annotation_zip=$ANNOTATION_ZIP" >> "$GITHUB_OUTPUT"

      - name: Extract sheet PNG
        id: sheet
        run: |
          set -euo pipefail

          ANNOTATION_DIR="$OUT_DIR/annotations"
          mkdir -p "$ANNOTATION_DIR"
          unzip -q "${{ steps.locate.outputs.annotation_zip }}" -d "$ANNOTATION_DIR"

          SHEET_PNG=$(find "$ANNOTATION_DIR" -type f -iname '*.png' | sort | head -n 1)
          if [ -z "$SHEET_PNG" ]; then
            echo "No PNG found in annotation zip"
            find "$ANNOTATION_DIR" -type f | sort
            exit 1
          fi

          cp "$SHEET_PNG" "$OUT_DIR/sheet-page1.png"

          echo "Sheet PNG: $SHEET_PNG"
          echo "sheet_png=$OUT_DIR/sheet-page1.png" >> "$GITHUB_OUTPUT"

      - name: Show first 20 JSONL lines
        run: |
          echo "Generated file: ${{ steps.locate.outputs.heads_file }}"
          head -n 20 "${{ steps.locate.outputs.heads_file }}"

      - name: Verify required keys
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          heads_file = os.environ["HEADS_FILE"]
          required = ["page", "x", "y", "step", "octave", "alteration", "label"]
          checked = 0
          missing_any = False

          with open(heads_file, encoding="utf-8") as fh:
              for line in fh:
                  line = line.strip()
                  if not line:
                      continue
                  checked += 1
                  obj = json.loads(line)
                  missing = [k for k in required if k not in obj]
                  if missing:
                      missing_any = True
                  print(f"line={checked} missing={missing}")
                  if checked >= 20:
                      break

          print(f"checked_lines={checked}")
          if checked == 0:
              print("No JSONL records found", file=sys.stderr)
              sys.exit(1)
          if missing_any:
              print("Missing required keys detected", file=sys.stderr)
              sys.exit(1)
          print("All required keys found in inspected lines")
          PY
        env:
          HEADS_FILE: ${{ steps.locate.outputs.heads_file }}

      - name: Create overlay PNG
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from PIL import Image, ImageDraw, ImageFont

          heads_file = Path("${{ steps.locate.outputs.heads_file }}")
          sheet_png = Path("${{ steps.sheet.outputs.sheet_png }}")
          overlay_png = Path("/tmp/audiveris-out/overlay-page1.png")

          img = Image.open(sheet_png).convert("RGB")
          draw = ImageDraw.Draw(img)

          font_paths = [
              "/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc",
              "/usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc",
              "/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf",
          ]

          font = None
          for path in font_paths:
              try:
                  font = ImageFont.truetype(path, 18)
                  break
              except Exception:
                  pass

          if font is None:
              font = ImageFont.load_default()

          count = 0
          with open(heads_file, encoding="utf-8") as fh:
              for line in fh:
                  if not line.strip():
                      continue
                  obj = json.loads(line)
                  if obj.get("page") != 1:
                      continue

                  label = obj.get("label")
                  x = obj.get("x")
                  y = obj.get("y")

                  if label is None or x is None or y is None:
                      continue

                  draw.text((int(x), max(0, int(y) - 12)), label, fill=(255, 0, 0), font=font)
                  count += 1

          img.save(overlay_png)
          print(f"overlay_png={overlay_png}")
          print(f"labels_drawn={count}")
          PY

      - name: Prepare artifact bundle
        run: |
          mkdir -p "$OUT_DIR/artifact"
          cp "${{ steps.locate.outputs.heads_file }}" "$OUT_DIR/artifact/heads.jsonl"
          cp "${{ steps.sheet.outputs.sheet_png }}" "$OUT_DIR/artifact/sheet-page1.png"
          cp "$OUT_DIR/overlay-page1.png" "$OUT_DIR/artifact/overlay-page1.png"
          ls -l "$OUT_DIR/artifact"

      - name: Upload overlay experiment artifact
        uses: actions/upload-artifact@v4
        with:
          name: head-overlay-experiment
          path: /tmp/audiveris-out/artifact/*
          if-no-files-found: error
          overwrite: true
